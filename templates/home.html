<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careerly - Discover Your Future</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    /* Fullscreen background */
    .hero {
      height: 100vh;
      background: url("{{ url_for('static', filename='background.png') }}") no-repeat center center/cover;
      display: flex;
      align-items: center;
      text-align: left;
      padding: 0 10%;
    }

    .hero-content {
      max-width: 500px;
      position: relative;
      z-index: 2;
    }

    .hero h3 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 25px;
      text-transform: uppercase;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn-custom {
      background: #00c3ff;
      color: white;
      font-size: 1.2rem;
      padding: 12px 30px;
      border-radius: 30px;
      transition: 0.3s;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,195,255,0.25);
    }
    .btn-custom:hover {
      background: #009fcc;
    }

    /* Minimal navbar */
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: transparent;
      padding: 15px 50px;
    }
    .navbar-brand {
      font-weight: 900;
      font-size: 1.8rem;
      color: white !important;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Navbar with only logo/name -->
  <nav class="navbar">
    <a class="navbar-brand" href="#">CAREERLY</a>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Discover Your Perfect Career Path</h1>
      <p>Careerly helps you find the right career based on your skills, interests, and academics. Get AI-powered predictions instantly!</p>
      <a href="/form" class="btn-custom">Start Now</a>
    </div>
  </section>

</body>
</html>
